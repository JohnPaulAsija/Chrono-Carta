name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands. Keeps
# the PR feedback signal clean and avoids burning CI minutes on stale
# commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Build needs the public-facing Supabase env so Next.js can inline
      # NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY into client bundles.
      # We point the build at the TEST branch — same Supabase project,
      # safe values to expose, and means CI never depends on production
      # values.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_TEST_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_TEST_SECRET_KEY }}
      ROUNDS_PER_GAME: "10"
      # Deterministic stand-in. Real value is in Cloud Secret Manager
      # for production. Tests that exercise the JWT round-trip just need
      # *some* secret; correctness doesn't depend on which one.
      GAME_STATE_SECRET: ci-fixed-game-state-secret-do-not-use-in-prod

      # Dedicated test-suite vars (architecture §Environment & Configuration).
      SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
      SUPABASE_TEST_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_TEST_PUBLISHABLE_KEY }}
      SUPABASE_TEST_SECRET_KEY: ${{ secrets.SUPABASE_TEST_SECRET_KEY }}

      # Passwords for the two seeded auth users on the TEST branch.
      # The integration suite signs in as them via signInAs(role) to
      # exercise RLS as real curator / admin.
      TEST_CURATOR_PASSWORD: ${{ secrets.TEST_CURATOR_PASSWORD }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --selectProjects unit

      - name: Integration tests
        run: npm test -- --selectProjects integration

      - run: npm run build
