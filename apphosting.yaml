# Firebase App Hosting backend config for ChronoCarta.
#
# Plain values are inlined here (version-controlled, reviewable).
# Secrets are referenced by name from Cloud Secret Manager and are
# uploaded out-of-band via:
#
#   firebase apphosting:secrets:set supabase-secret-key
#   firebase apphosting:secrets:set game-state-secret
#
# The CLI also grants the App Hosting service account secretAccessor
# permission, which is why we prefer it over the console UI.
#
# availability semantics:
#   BUILD   — value is bundled into the build (required for NEXT_PUBLIC_*).
#   RUNTIME — value is read at request time on the Cloud Run instance.
# Secrets are RUNTIME only; we never want their values in build artifacts.

runConfig:
  # Cliopatria is loaded into RAM on first access (architecture
  # §Cliopatria Loading Performance). The on-disk JSON is ~178 MB and
  # JSON.parse expands to several times that in V8 heap, so we need
  # 2 GiB to avoid OOM at cold start. Cloud Run requires cpu>=1 below
  # 4 GiB and cpu>=2 at >=4 GiB, so 2 GiB / 1 vCPU is the sweet spot.
  # minInstances=0 means we accept cold starts in exchange for $0 idle cost.
  cpu: 1
  memoryMiB: 2048
  minInstances: 0
  maxInstances: 1
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://dyswgwgmilmjjmtmuwdf.supabase.co
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
    value: sb_publishable_eeRYeAZjyuBlJE2z8Q2Wqw_mS3TF4-a
    availability:
      - BUILD
      - RUNTIME

  - variable: ROUNDS_PER_GAME
    value: "10"
    availability:
      - BUILD
      - RUNTIME

  - variable: SUPABASE_SECRET_KEY
    secret: supabase-secret-key
    availability:
      - RUNTIME

  - variable: GAME_STATE_SECRET
    secret: game-state-secret
    availability:
      - RUNTIME
